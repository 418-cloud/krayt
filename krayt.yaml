# krayt.yaml — tracked, shared dev config for dogfooding krayt on its own repo, auto-loaded from
# <repo>/krayt.yaml (§8.1/§8.3) so `krayt run --task <file>` picks these up without the long flag
# list. Any flag overrides the matching value here. Every krayt contributor gets the same starting
# point: the known-good krayt-dev image, model/effort, and this repo's own network allowlist.
#
# `secrets:` below only names a path — the file it points at (secrets.env) is gitignored and this
# file carries no secret value. Never inline a real credential into this file's `env:` block;
# per-task secrets belong only in that gitignored secrets.env (§6.8).
# `task:` is intentionally omitted so you always pass --task per run.

image: ghcr.io/418-cloud/krayt-dev:sha-7ca7cc7
secrets: secrets.env
env:
  CLAUDE_MODEL: claude-opus-4-8
  CLAUDE_EFFORT: high

bundle_depth: 0 # full-history bundle

agent:
  adapter: claude-code

questions:
  mode: wait # pause on an agent question; resolve with `krayt answer`

network:
  mode: allowlist
  allow:
    - api.anthropic.com # Claude Code
    - proxy.golang.org # Go module proxy
    - sum.golang.org # Go checksum db
    - storage.googleapis.com # Go module blob downloads
    - cache.nixos.org # Nix binary cache (vendorHash regen)
    - github.com # Nix flake inputs
    - codeload.github.com # Nix flake input tarballs
