version: "2"

run:
  # Build tags so the linter sees the darwin provider seam (§9.1 build constraints).
  build-tags:
    - darwin

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
  exclusions:
    rules:
      # Generated protocol code is not linted.
      - path: internal/protocol/pb/
        linters:
          - revive
          - staticcheck
