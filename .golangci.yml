version: "2"

# OS-specific files (provider seams, doctor checks) are linted under their native GOOS
# by running the CI lint job on both macOS and Linux — not via build-tags, which would
# leave GOOS mismatched and break stdlib typechecking.

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
  exclusions:
    rules:
      # Generated protocol code is not linted.
      - path: internal/protocol/pb/
        linters:
          - revive
          - staticcheck
