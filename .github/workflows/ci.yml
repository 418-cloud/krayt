name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: # lets you run the slow integration job on demand (see integration-linux)

permissions:
  contents: read

jobs:
  test:
    name: build + test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race ./...

  cross-compile-guest:
    name: cross-compile guest (linux/arm64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      # The guest-agent and OS-agnostic core must cross-compile to the VM's arch (§9.1).
      - run: GOOS=linux GOARCH=arm64 go build ./...

  lint:
    name: golangci-lint (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: latest

  # Gate for the slow integration job below. The unit `test`/`lint` jobs run on every PR; the
  # real-VM suite boots a micro-VM per test, so we only run it when something that can affect it
  # changed (or on manual dispatch). A tiny filter job keeps that path-scoping out of the
  # workflow-level `on:` (which would filter ALL jobs, including the always-on unit tests).
  changes:
    name: detect integration-affecting changes
    runs-on: ubuntu-latest
    outputs:
      integration: ${{ steps.filter.outputs.integration }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        # Skipped on workflow_dispatch (no diff base); the integration job's `if` runs it anyway then.
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            integration:
              - 'internal/provider/**'
              - 'internal/orchestrator/**'
              - 'internal/guest/**'
              - 'cmd/krayt-agent/**'
              - 'hack/*-probe/**'
              - 'hack/netprobe/**'
              - 'hack/run-integration-tests.sh'
              - '.github/workflows/ci.yml'

  # Real-VM integration suite on Linux/firecracker (§14 Phase 7), driven by the one-command
  # hack/run-integration-tests.sh. Needs /dev/kvm on the runner: the standard hosted Ubuntu runner
  # DOES expose /dev/kvm, but it's root:kvm 0660 and the runner user isn't in that group — and
  # since a CI job never gets a fresh login session, `sudo usermod -aG kvm` (krayt doctor's normal
  # fix) can't take effect here. The "Allow KVM access" step below works around that with a udev
  # rule instead of group membership. If /dev/kvm were genuinely unavailable, krayt doctor would
  # still fail the preflight and this job would go red rather than silently passing.
  integration-linux:
    name: integration (linux/firecracker)
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.integration == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read # pull the base VM image + probe images from GHCR
    env:
      FIRECRACKER_VERSION: v1.16.1
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      # Diagnostic for the TestEgressEnforcement failure under investigation (HUMAN_TODO.md):
      # every CI run so far has failed it with a ~10.0s delay before "Bad Gateway", matching
      # Go's default UDP DNS resolver retry ceiling (2 attempts x 5s) almost to the millisecond —
      # consistent with the guest's query to 1.1.1.1:53 (internal/guest/proxy.DefaultDNSServer,
      # hardcoded, no host override) going unanswered. Run BEFORE any KVM/NAT/firecracker setup
      # below touches the host, on the bare runner network, to tell apart two very different
      # fixes: if the runner itself can't reach 1.1.1.1:53, the fix is a guest-side resolver
      # change (needs an image rebuild + hardware boot test, human/CI-gated); if the runner CAN
      # reach it fine, the bug is in the guest->NAT->host forwarding path instead (fixable in
      # hack/linux-net-setup.sh, no image rebuild needed). Informational only — never fails the
      # job, since the integration suite below is what actually needs to pass or fail.
      - name: Diagnose DNS reachability to 1.1.1.1:53 / 8.8.8.8:53 from the bare runner host
        continue-on-error: true
        run: |
          python3 - <<'EOF'
          import socket
          import struct
          import time

          def build_query(name: str) -> bytes:
              header = struct.pack(">HHHHHH", 0x1234, 0x0100, 1, 0, 0, 0)
              question = b"".join(
                  bytes([len(label)]) + label.encode() for label in name.split(".")
              ) + b"\x00" + struct.pack(">HH", 1, 1)  # QTYPE=A, QCLASS=IN
              return header + question

          query = build_query("example.com")
          for host, port in [("1.1.1.1", 53), ("8.8.8.8", 53)]:
              # UDP: an actual DNS query/response round trip, not just a socket open (which
              # would falsely "succeed" for UDP even if every packet is silently dropped).
              udp = socket.socket(socket.AF_INET, socket.SOCK_DGRAM)
              udp.settimeout(6)
              start = time.monotonic()
              try:
                  udp.sendto(query, (host, port))
                  data, _ = udp.recvfrom(512)
                  print(f"[dns-check] UDP {host}:{port} -> {len(data)} bytes in {time.monotonic()-start:.2f}s: OK")
              except socket.timeout:
                  print(f"[dns-check] UDP {host}:{port} -> TIMEOUT after {time.monotonic()-start:.2f}s (no response)")
              except OSError as e:
                  print(f"[dns-check] UDP {host}:{port} -> ERROR: {e}")
              finally:
                  udp.close()

              # TCP:53 connect, as a complementary signal (DNS-over-TCP; also what a real
              # resolver falls back to on a truncated UDP response).
              tcp = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
              tcp.settimeout(6)
              start = time.monotonic()
              try:
                  tcp.connect((host, port))
                  print(f"[dns-check] TCP {host}:{port} -> connected in {time.monotonic()-start:.2f}s: OK")
              except OSError as e:
                  print(f"[dns-check] TCP {host}:{port} -> ERROR after {time.monotonic()-start:.2f}s: {e}")
              finally:
                  tcp.close()
          EOF

      # krayt-probe (and krayt-vmimage) are public, but log in anyway: cheap insurance against the
      # package ever going private again, and it matches what the vmimage pulls already assume works.
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # /dev/kvm on the hosted runner is root:kvm 0660; the runner user has no group membership
      # and, unlike an interactive host, this job never gets a new login session for `usermod
      # -aG kvm` to take effect. A udev rule making the device world-accessible sidesteps group
      # membership entirely — the standard fix for KVM-dependent GitHub Actions jobs (also used to
      # accelerate the Android emulator on hosted runners).
      - name: Allow KVM access for the runner user
        run: |
          set -euo pipefail
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -l /dev/kvm

      - name: Install firecracker
        run: |
          set -euo pipefail
          tgz="firecracker-${FIRECRACKER_VERSION}-x86_64.tgz"
          url="https://github.com/firecracker-microvm/firecracker/releases/download/${FIRECRACKER_VERSION}/${tgz}"
          curl -fsSL "$url" -o "$tgz"
          tar -xzf "$tgz"
          sudo install "release-${FIRECRACKER_VERSION}-x86_64/firecracker-${FIRECRACKER_VERSION}-x86_64" /usr/local/bin/firecracker
          firecracker --version | head -1

      # Ensure the tap device node exists (krayt creates each VM's tap over it), then do the one-time
      # host NAT/forwarding setup the per-run script deliberately does NOT do itself (decision: that
      # persistent host state is a separate step). It caps the binary we pass, but the script rebuilds
      # + re-caps ./bin/krayt itself; this call is only here for the NAT/forward + ip_forward state.
      - name: Host network setup (tun + NAT)
        run: |
          set -euo pipefail
          sudo modprobe tun || true
          make krayt
          sudo hack/linux-net-setup.sh "$PWD/bin/krayt"

      # Diagnostic, follow-up to the DNS-reachability check above: the bare runner CAN reach
      # 1.1.1.1:53/8.8.8.8:53 fine, so TestEgressEnforcement's failure is somewhere in the
      # guest->NAT->host forwarding path, not the runner's external network. Two well-known
      # candidates, neither exclusive to GH Actions — any Linux host running both Docker and
      # krayt's firecracker backend could plausibly hit the same thing:
      #   1. dockerd sets a default-deny FORWARD chain policy at startup, specifically to
      #      isolate container networking, independent of and not overridden by krayt's own
      #      krayt_fwd table (nftables evaluates every base chain hooked at a given point
      #      independently; a DROP in any one of them is terminal regardless of what others
      #      decide). GH Actions runners have dockerd running by default.
      #   2. Strict reverse-path filtering (rp_filter) on the tap/primary interface, which
      #      hack/linux-net-setup.sh does not currently touch.
      # Dump the actual ruleset right before the suite runs — the same moment the DNS query
      # would be failing — instead of guessing which (if either) it is. Never fails the job.
      - name: Diagnose host firewall/forwarding state (Docker interop, rp_filter)
        continue-on-error: true
        run: |
          echo "--- nft ruleset ---"
          sudo nft list ruleset || echo "(nft list ruleset failed or empty)"
          echo "--- iptables -S FORWARD (legacy/nft-compat view, if present) ---"
          sudo iptables -S FORWARD 2>&1 || echo "(iptables not available/applicable)"
          echo "--- DOCKER-USER chain, if Docker created one ---"
          sudo iptables -S DOCKER-USER 2>&1 || echo "(no DOCKER-USER chain)"
          echo "--- rp_filter sysctls ---"
          for f in /proc/sys/net/ipv4/conf/all/rp_filter /proc/sys/net/ipv4/conf/default/rp_filter /proc/sys/net/ipv4/conf/*/rp_filter; do
            [ -f "$f" ] && echo "$f = $(cat "$f")"
          done
          echo "--- ip forwarding + link state ---"
          cat /proc/sys/net/ipv4/ip_forward
          ip -brief link show

      - name: Run the integration suite
        run: hack/run-integration-tests.sh
