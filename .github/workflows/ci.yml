name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: # lets you run the slow integration job on demand (see integration-linux)

permissions:
  contents: read

jobs:
  test:
    name: build + test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race ./...

  cross-compile-guest:
    name: cross-compile guest (linux/arm64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      # The guest-agent and OS-agnostic core must cross-compile to the VM's arch (§9.1).
      - run: GOOS=linux GOARCH=arm64 go build ./...

  lint:
    name: golangci-lint (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: latest

  # Gate for the slow integration job below. The unit `test`/`lint` jobs run on every PR; the
  # real-VM suite boots a micro-VM per test, so we only run it when something that can affect it
  # changed (or on manual dispatch). A tiny filter job keeps that path-scoping out of the
  # workflow-level `on:` (which would filter ALL jobs, including the always-on unit tests).
  changes:
    name: detect integration-affecting changes
    runs-on: ubuntu-latest
    outputs:
      integration: ${{ steps.filter.outputs.integration }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        # Skipped on workflow_dispatch (no diff base); the integration job's `if` runs it anyway then.
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            integration:
              - 'internal/provider/**'
              - 'internal/orchestrator/**'
              - 'internal/guest/**'
              - 'cmd/krayt-agent/**'
              - 'hack/*-probe/**'
              - 'hack/netprobe/**'
              - 'hack/run-integration-tests.sh'
              - '.github/workflows/ci.yml'

  # Real-VM integration suite on Linux/firecracker (§14 Phase 7), driven by the one-command
  # hack/run-integration-tests.sh. Needs /dev/kvm on the runner: the standard hosted Ubuntu runner
  # DOES expose /dev/kvm, but it's root:kvm 0660 and the runner user isn't in that group — and
  # since a CI job never gets a fresh login session, `sudo usermod -aG kvm` (krayt doctor's normal
  # fix) can't take effect here. The "Allow KVM access" step below works around that with a udev
  # rule instead of group membership. If /dev/kvm were genuinely unavailable, krayt doctor would
  # still fail the preflight and this job would go red rather than silently passing.
  integration-linux:
    name: integration (linux/firecracker)
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.integration == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read # pull the base VM image + probe images from GHCR
    env:
      FIRECRACKER_VERSION: v1.16.1
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      # krayt-probe (and krayt-vmimage) are public, but log in anyway: cheap insurance against the
      # package ever going private again, and it matches what the vmimage pulls already assume works.
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # /dev/kvm on the hosted runner is root:kvm 0660; the runner user has no group membership
      # and, unlike an interactive host, this job never gets a new login session for `usermod
      # -aG kvm` to take effect. A udev rule making the device world-accessible sidesteps group
      # membership entirely — the standard fix for KVM-dependent GitHub Actions jobs (also used to
      # accelerate the Android emulator on hosted runners).
      - name: Allow KVM access for the runner user
        run: |
          set -euo pipefail
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -l /dev/kvm

      - name: Install firecracker
        run: |
          set -euo pipefail
          tgz="firecracker-${FIRECRACKER_VERSION}-x86_64.tgz"
          url="https://github.com/firecracker-microvm/firecracker/releases/download/${FIRECRACKER_VERSION}/${tgz}"
          curl -fsSL "$url" -o "$tgz"
          tar -xzf "$tgz"
          sudo install "release-${FIRECRACKER_VERSION}-x86_64/firecracker-${FIRECRACKER_VERSION}-x86_64" /usr/local/bin/firecracker
          firecracker --version | head -1

      # Ensure the tap device node exists (krayt creates each VM's tap over it), then do the one-time
      # host NAT/forwarding setup the per-run script deliberately does NOT do itself (decision: that
      # persistent host state is a separate step). It caps the binary we pass, but the script rebuilds
      # + re-caps ./bin/krayt itself; this call is only here for the NAT/forward + ip_forward state.
      - name: Host network setup (tun + NAT)
        run: |
          set -euo pipefail
          sudo modprobe tun || true
          make krayt
          sudo hack/linux-net-setup.sh "$PWD/bin/krayt"

      - name: Run the integration suite
        run: hack/run-integration-tests.sh
