name: Release Please

# release-please maintains a "release PR" that bumps the version + CHANGELOG from Conventional
# Commits; merging it cuts the release (tag `vX.Y.Z` + GitHub Release). The CLI binaries are built
# and uploaded in the same run (gated on release_created), so no PAT is needed — the default
# GITHUB_TOKEN can't trigger a *separate* tag-driven workflow, but this runs in-workflow.
#
# The VM image releases on its own `vmimage-v*` tags (see .github/workflows/image.yml); the CLI
# pins its digest via internal/vmimage/pinned.go. See RELEASING.md.

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  cli-release:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write # upload release assets
    env:
      TAG: ${{ needs.release-please.outputs.tag_name }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      # Pure-Go (CGO off): one Linux runner cross-builds every target. darwin/arm64 is the
      # supported macOS target; darwin/amd64 builds but is untested (see README). linux/amd64 is
      # the supported Linux target — the only host arch the Firecracker backend has been verified
      # on (Phase 7, real hardware). No linux/arm64: the base VM image isn't just arch-tagged, it's
      # backend-tagged (images/flake.nix builds a PE `Image` for vfkit vs. an uncompressed ELF
      # vmlinux for Firecracker), and the only published linux/arm64 image variant is the
      # vfkit-formatted one — a linux/arm64 krayt would resolve to it via vmimage.selectPlatform
      # and fail to boot under Firecracker. Add it once a Firecracker-compatible arm64 image exists.
      - name: Build krayt (darwin/arm64, darwin/amd64, linux/amd64)
        run: |
          set -euo pipefail
          mkdir -p dist
          for target in darwin/arm64 darwin/amd64 linux/amd64; do
            os="${target%/*}"
            arch="${target#*/}"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
              go build -trimpath -ldflags "-s -w" -o dist/krayt ./cmd/krayt
            tar -C dist -czf "dist/krayt_${TAG}_${os}_${arch}.tar.gz" krayt
            rm dist/krayt
          done
          (cd dist && sha256sum *.tar.gz > checksums.txt)

      - name: Upload binaries to the release
        run: gh release upload "$TAG" dist/krayt_*.tar.gz dist/checksums.txt --clobber
